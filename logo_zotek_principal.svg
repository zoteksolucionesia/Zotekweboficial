<svg width="160" height="60" viewBox="0 0 160 60" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Animación de pulso para el círculo central */
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    .circle-main { animation: pulse 2s infinite ease-in-out; }

    /* Animación de rotación para los puntos externos */
    @keyframes rotateDots {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .dot-group { animation: rotateDots 5s linear infinite; transform-origin: center; }
  </style>

  <!-- Icono IA / Chip tecnológico -->
  <g transform="translate(35, 30)">
    <circle r="14" cx="0" cy="0" fill="#00bcd4" class="circle-main"/>
    <g class="dot-group" style="transform-box: fill-box; transform-origin: center;">
      <circle r="4" cx="-18" cy="-18" fill="#ff0066" fill-opacity="0.7"/>
      <circle r="4" cx="18" cy="-18" fill="#ff0066" fill-opacity="0.7"/>
      <circle r="4" cx="-18" cy="18" fill="#ff0066" fill-opacity="0.7"/>
      <circle r="4" cx="18" cy="18" fill="#ff0066" fill-opacity="0.7"/>
    </g>
    <!-- Líneas de conexión -->
    <line x1="-18" y1="-18" x2="0" y2="0" stroke="#00bcd4" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="18" y1="-18" x2="0" y2="0" stroke="#00bcd4" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="-18" y1="18" x2="0" y2="0" stroke="#00bcd4" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="18" y1="18" x2="0" y2="0" stroke="#00bcd4" stroke-width="1.5" stroke-opacity="0.5"/>
  </g>

  <!-- Texto Zotek -->
  <text x="65" y="38" fill="#1565C0" font-family="'Space Grotesk', sans-serif" font-size="28" font-weight="600" dominant-baseline="middle">Zotek</text>
</svg>
